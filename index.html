<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Lyric Capital Group | Active Deal Pipeline</title>
<style>
  :root {
    --ink: #15181D;
    --paper: #F7F8FA;
    --card: #FFFFFF;
    --line: #E5E7EB;
    --blue: #0066B3;
    --gray: #5C6370;
    --gray-light: #98A0AB;
    --green: #2F6B4F;
    --green-bg: #EAF2ED;
    --amber: #96631C;
    --amber-bg: #F6EEDF;
    --slate: #4A5A78;
    --slate-bg: #EAEEF4;
    --red: #8C3A32;
    --red-bg: #F5E9E7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
  }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 0 28px; }

  header { background: var(--card); border-bottom: 1px solid var(--line); }
  .header-inner { padding: 22px 0 18px; }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; margin-bottom: 18px;
  }
  .logo { height: 32px; width: auto; display: block; }
  .meta { font-size: 12px; color: var(--gray-light); text-align: right; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .refresh-btn {
    font-size: 12px; font-weight: 600; color: #fff; background: var(--blue);
    border: none; border-radius: 4px; padding: 9px 16px; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  .refresh-btn:disabled { background: var(--gray-light); cursor: default; }
  .title-row {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  h1 { font-size: 26px; font-weight: 700; margin: 0; line-height: 1.1; letter-spacing: -0.01em; }
  .stats { display: flex; gap: 36px; }
  .stat { text-align: right; }
  .stat-num { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .stat-num.blue { color: var(--blue); }
  .stat-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gray-light);
  }

  main { padding: 32px 0 56px; }
  .filters { display: flex; flex-direction: column; gap: 10px; margin-bottom: 26px; }
  .filter-row { display: flex; align-items: flex-start; gap: 10px; }
  .filter-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gray-light);
    min-width: 64px; padding-top: 8px;
  }
  .filter-btns { display: inline-flex; flex-wrap: wrap; gap: 6px; }
  .fbtn {
    font-size: 12px; font-weight: 600; color: var(--gray);
    background: var(--card); border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 12px; cursor: pointer; white-space: nowrap; line-height: 1.2;
    font-family: inherit;
  }
  .fbtn.active { color: #fff; background: var(--blue); border-color: var(--blue); }

  .cols {
    display: grid;
    grid-template-columns: minmax(160px, 1.3fr) minmax(110px, 0.7fr) minmax(110px, 0.7fr) minmax(0, 1.8fr) auto;
    gap: 16px; padding: 0 20px 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gray-light);
  }
  .cols .right { justify-self: end; }

  .stage { margin-bottom: 28px; }
  .stage-head { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .stage-chip {
    width: 34px; height: 34px; background: var(--blue); color: #fff;
    font-size: 15px; font-weight: 700; display: flex; align-items: center;
    justify-content: center; border-radius: 3px; flex-shrink: 0;
  }
  .stage-name { font-size: 19px; font-weight: 700; margin: 0; flex-grow: 1; }
  .stage-count {
    font-size: 12px; font-weight: 600; color: var(--gray-light);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .stage-card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 4px; overflow: hidden;
  }
  .deal {
    display: grid;
    grid-template-columns: minmax(160px, 1.3fr) minmax(110px, 0.7fr) minmax(110px, 0.7fr) minmax(0, 1.8fr) auto;
    gap: 16px; align-items: baseline; padding: 13px 20px;
    border-bottom: 1px solid var(--line);
  }
  .deal:last-child { border-bottom: none; }
  .deal-name { font-size: 16px; font-weight: 600; }
  .deal-cell { font-size: 13px; color: var(--gray); line-height: 1.5; }
  .muted { color: var(--gray-light); }
  .pill {
    display: inline-block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; border-radius: 3px; padding: 3px 8px;
    white-space: nowrap; justify-self: end;
  }
  .pill.green { color: var(--green); background: var(--green-bg); }
  .pill.amber { color: var(--amber); background: var(--amber-bg); }
  .pill.slate { color: var(--slate); background: var(--slate-bg); }
  .empty-row { padding: 18px 20px; font-size: 13px; color: var(--gray-light); }

  .notice { padding: 24px 0; font-size: 14px; color: var(--gray); }
  .error {
    margin-bottom: 20px; padding: 12px 16px; background: var(--red-bg);
    border: 1px solid #E0C7C3; border-radius: 4px; font-size: 13px; color: var(--red);
  }

  footer {
    margin-top: 12px; padding-top: 16px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--gray-light);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }

  #gate {
    position: fixed; inset: 0; background: var(--paper);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .gate-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    padding: 36px; width: 340px; text-align: center;
  }
  .gate-card img { height: 28px; margin-bottom: 20px; }
  .gate-card p { font-size: 13px; color: var(--gray); margin: 0 0 16px; }
  .gate-card input {
    width: 100%; padding: 9px 12px; font-size: 14px;
    border: 1px solid var(--line); border-radius: 4px; margin-bottom: 12px;
    font-family: inherit;
  }
  .gate-card button {
    width: 100%; padding: 10px; font-size: 13px; font-weight: 600;
    color: #fff; background: var(--blue); border: none; border-radius: 4px;
    cursor: pointer; font-family: inherit;
  }
  .gate-error { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }

  @media print {
    .fbtn, .refresh-btn { display: none !important; }
    body { background: #fff; }
  }
</style>
</head>
<body>

<div id="gate" style="display:none">
  <div class="gate-card">
    <img id="gate-logo" alt="Lyric Capital Group" />
    <p>Enter the access code to view the pipeline.</p>
    <input id="gate-input" type="password" placeholder="Access code" />
    <button id="gate-btn">View pipeline</button>
    <div class="gate-error" id="gate-error">That code was not recognized.</div>
  </div>
</div>

<header>
  <div class="wrap header-inner">
    <div class="header-top">
      <img id="logo" class="logo" alt="Lyric Capital Group" />
      <div class="header-right">
        <div class="meta" id="meta">Loading data</div>
        <button id="refresh-btn" class="refresh-btn" style="display:none">Refresh</button>
      </div>
    </div>
    <div class="title-row">
      <h1>Active Deal Pipeline</h1>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="stat-total">&ndash;</div>
          <div class="stat-label">In pipeline</div>
        </div>
        <div class="stat">
          <div class="stat-num blue" id="stat-late">&ndash;</div>
          <div class="stat-label">LOI or beyond</div>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div id="error" class="error" style="display:none"></div>
  <div id="loading" class="notice">Loading the pipeline</div>
  <div id="content" style="display:none">
    <div class="filters">
      <div class="filter-row">
        <span class="filter-label">Stage</span>
        <div class="filter-btns" id="stage-filters"></div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Strategy</span>
        <div class="filter-btns" id="strat-filters"></div>
      </div>
    </div>
    <div class="cols">
      <div>Deal</div><div>Deal Lead</div><div>Deal Source</div><div>Next Steps</div><div class="right">Status</div>
    </div>
    <div id="stages"></div>
    <footer>
      <span>Prepared by Lyric Capital Group</span>
      <span>Confidential. Not for distribution.</span>
    </footer>
  </div>
</main>

const STAGES = [
  { gid: "1214909596271789", num: "10", name: "Closing Stage", short: "Closing" },
  { gid: "1214909596979591", num: "9", name: "Exclusivity / Diligence Period", short: "Exclusivity" },
  { gid: "1214909311161519", num: "8", name: "LOI Stage", short: "LOI" },
  { gid: "1214909594772955", num: "7", name: "Model Complete", short: "Model Complete" },
  { gid: "1214909312215127", num: "6", name: "Model Underway", short: "Model Underway" },
  { gid: "1214909596139966", num: "5", name: "Explore Further / High-Level Model", short: "Explore Further" },
  { gid: "1214909617968156", num: "4", name: "One Pager Underway", short: "One Pager" },
  { gid: "1214909618018444", num: "3", name: "Awaiting Diligence Materials", short: "Awaiting Materials" },
  { gid: "1214909655380534", num: "2", name: "NDA Stage", short: "NDA" },
  { gid: "1214909620891849", num: "1", name: "Deal Identified", short: "Identified" },
];

const STRATEGIES = [
  { key: "lyric", label: "Lyric" },
  { key: "mmm", label: "MMM" },
  { key: "sos", label: "SOS" },
];

let data = null;
let stageFilter = null;
let stratFilter = null;

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s == null ? "" : String(s);
  return d.innerHTML;
}

function matchesStrategy(deal, key) {
  if (!key) return true;
  const v = (deal.strat || "").toLowerCase();
  if (key === "lyric") return v.includes("lyric");
  if (key === "mmm") return v.includes("mmm");
  if (key === "sos") return v.includes("spirit") || v.includes("sos");
  return true;
}

function pillClass(s) {
  const v = (s || "").toLowerCase();
  if (v.includes("hold")) return "amber";
  if (v.includes("watch")) return "slate";
  return "green";
}

function render() {
  if (!data) return;
  const visible = stageFilter ? STAGES.filter((s) => s.gid === stageFilter) : STAGES;

  let total = 0, late = 0;
  const html = visible.map((stage) => {
    const deals = (data.deals[stage.gid] || []).filter((d) => matchesStrategy(d, stratFilter));
    total += deals.length;
    if (["8", "9", "10"].includes(stage.num)) late += deals.length;

    const rows = deals.length === 0
      ? '<div class="empty-row">No deals currently at this stage</div>'
      : deals.map((d) =>
          '<div class="deal">' +
            '<div class="deal-name">' + esc(d.n) + '</div>' +
            '<div class="deal-cell">' + (d.l ? esc(d.l) : '<span class="muted">Unassigned</span>') + '</div>' +
            '<div class="deal-cell">' + (d.src ? esc(d.src) : '<span class="muted">&ndash;</span>') + '</div>' +
            '<div class="deal-cell">' + (d.x ? esc(d.x) : '<span class="muted">No update noted</span>') + '</div>' +
            '<span class="pill ' + pillClass(d.s) + '">' + esc(d.s || "Active") + '</span>' +
          '</div>'
        ).join("");

    return (
      '<section class="stage">' +
        '<div class="stage-head">' +
          '<div class="stage-chip">' + stage.num + '</div>' +
          '<h2 class="stage-name">' + esc(stage.name) + '</h2>' +
          '<div class="stage-count">' + deals.length + (deals.length === 1 ? " deal" : " deals") + '</div>' +
        '</div>' +
        '<div class="stage-card">' + rows + '</div>' +
      '</section>'
    );
  }).join("");

  document.getElementById("stages").innerHTML = html;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-late").textContent = late;

  const asOf = new Date(data.generatedAt).toLocaleString("en-US", {
    month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit",
  });
  document.getElementById("meta").textContent = "Data as of " + asOf;
}

function buildFilters() {
  const stageEl = document.getElementById("stage-filters");
  const stratEl = document.getElementById("strat-filters");

  function btn(label, title, isActive, onClick) {
    const b = document.createElement("button");
    b.className = "fbtn" + (isActive ? " active" : "");
    b.textContent = label;
    if (title) b.title = title;
    b.onclick = onClick;
    return b;
  }

  function rebuild() {
    stageEl.innerHTML = "";
    stageEl.appendChild(btn("All", null, stageFilter === null, () => { stageFilter = null; rebuild(); render(); }));
    STAGES.forEach((s) => {
      stageEl.appendChild(btn(s.short, s.name, stageFilter === s.gid, () => {
        stageFilter = stageFilter === s.gid ? null : s.gid; rebuild(); render();
      }));
    });
    stratEl.innerHTML = "";
    stratEl.appendChild(btn("All", null, stratFilter === null, () => { stratFilter = null; rebuild(); render(); }));
    STRATEGIES.forEach((st) => {
      stratEl.appendChild(btn(st.label, null, stratFilter === st.key, () => {
        stratFilter = stratFilter === st.key ? null : st.key; rebuild(); render();
      }));
    });
  }
  rebuild();
}

async function load(code, force) {
  var params = [];
  if (code) params.push("code=" + encodeURIComponent(code));
  if (force) params.push("t=" + Date.now());
  const url = "/api/pipeline" + (params.length ? "?" + params.join("&") : "");
  const r = await fetch(url);
  if (r.status === 401) return "unauthorized";
  if (!r.ok) throw new Error("HTTP " + r.status);
  data = await r.json();
  return "ok";
}

async function refreshNow() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "Updating";
  try {
    const code = sessionStorage.getItem("lcg_code") || "";
    const result = await load(code, true);
    if (result === "ok") render();
  } catch (e) {
    document.getElementById("meta").textContent = "Refresh failed. Try again shortly.";
  } finally {
    btn.disabled = false;
    btn.textContent = "Refresh";
  }
}

function showGate() {
  document.getElementById("gate").style.display = "flex";
  const input = document.getElementById("gate-input");
  const err = document.getElementById("gate-error");
  const go = async () => {
    const code = input.value.trim();
    if (!code) return;
    err.style.display = "none";
    try {
      const result = await load(code);
      if (result === "ok") {
        sessionStorage.setItem("lcg_code", code);
        document.getElementById("gate").style.display = "none";
        boot();
      } else {
        err.style.display = "block";
      }
    } catch {
      err.style.display = "block";
    }
  };
  document.getElementById("gate-btn").onclick = go;
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
  input.focus();
}

function boot() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";
  const btn = document.getElementById("refresh-btn");
  btn.style.display = "inline-block";
  btn.onclick = refreshNow;
  buildFilters();
  render();
}

(async function init() {
  const saved = sessionStorage.getItem("lcg_code") || "";
  try {
    const result = await load(saved);
    if (result === "ok") {
      boot();
    } else {
      document.getElementById("loading").style.display = "none";
      showGate();
    }
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    const el = document.getElementById("error");
    el.textContent = "The pipeline data could not be loaded. Try again shortly.";
    el.style.display = "block";
  }
})();
</script>
</body>
</html>
